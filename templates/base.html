<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ComicArc{% endblock %}</title>
  <meta name="theme-color" content="#0b0c18">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ComicArc">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-brand">
      <span class="brand-icon">◈</span>
      ComicArc
    </a>
    <div class="nav-links">
      <a href="/" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">Library</a>
      <a href="/runs" class="nav-link {% if request.endpoint in ['runs','run_detail','new_run','edit_run'] %}active{% endif %}">Runs</a>
      <a href="/stats" class="nav-link {% if request.endpoint == 'stats' %}active{% endif %}">Stats</a>
    </div>
    <a href="/precache-covers" class="btn-scan btn-scan-secondary">Cache Covers</a>
    <a href="/scan" class="btn-scan">Scan Library</a>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/static/sw.js');
    // Fade-in all images once loaded
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('img').forEach(img => {
        if (img.complete) img.classList.add('loaded');
        else img.addEventListener('load', () => img.classList.add('loaded'));
      });
    });
  </script>
</body>
</html>
