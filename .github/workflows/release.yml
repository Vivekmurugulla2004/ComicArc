name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            name: macOS
            artifact: ComicArc-macOS.zip
          - os: windows-latest
            name: Windows
            artifact: ComicArc-Windows.zip
          - os: ubuntu-latest
            name: Linux
            artifact: ComicArc-Linux.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Linux display dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-gi python3-gi-cairo gir1.2-gtk-3.0 gir1.2-webkit2-4.0 libgirepository1.0-dev gcc libcairo2-dev pkg-config

      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        run: pyinstaller build/ComicArc.spec --clean --noconfirm

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: pyinstaller build/ComicArc.spec --clean --noconfirm

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: pyinstaller build/ComicArc.spec --clean --noconfirm

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          dot_clean -m dist/ComicArc.app
          find dist/ComicArc.app -name '._*' -delete
          ditto -c -k --keepParent dist/ComicArc.app ${{ matrix.artifact }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Compress-Archive -Path dist\ComicArc\* -DestinationPath ${{ matrix.artifact }}

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: tar -czf ${{ matrix.artifact }} -C dist ComicArc

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: false
          body: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for what's new.
